<!DOCTYPE html>
<html>
<head>
    <title>CSS Basics Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>CSS Basics Lab</h1>
    </header>

    <!-- Main Content -->
    <main>

        <!-- Box Model -->
        <section>
            <h2>Box Model Example</h2>
            <div class="box">
                This is a box using margin, padding, and border.
            </div>
        </section>

        <!-- Flexbox -->
        <section>
            <h2>Flexbox Layout</h2>
            <div class="flex-container">
                <div class="item">1</div>
                <div class="item">2</div>
                <div class="item">3</div>
            </div>
        </section>

        <!-- Form -->
        <section>
            <h2>Styled Form</h2>
            <form>
                <label>Name:</label><br>
                <input type="text" placeholder="Enter your name"><br>

                <label>Email:</label><br>
                <input type="email" placeholder="Enter your email"><br>

                <button type="submit">Submit</button>
            </form>
        </section>

    </main>

    <!-- Footer -->
    <footer>
        <p>Footer Section</p>
    </footer>

</body>
</html>
